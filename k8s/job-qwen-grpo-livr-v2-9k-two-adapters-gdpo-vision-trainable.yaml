apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-2a-gdpo-vision-trainable
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-2a-gdpo-vision-trainable
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -eo pipefail
          echo "========================================="
          echo "two-adapters GDPO + vision-trainable variant"
          echo ""
          echo "Setup:"
          echo "  - TWO trainable LoRA adapters; vision tower NOT frozen."
          echo "      * 'response' (init from baseline-A1 ckpt-1000)."
          echo "      * 'feedback' starts fresh from base."
          echo "  - Vision tower base weights TRAINABLE (no --freeze_vision_tower),"
          echo "    so the vision encoder forward produces grad-bearing outputs"
          echo "    and the grad-ckpt backward fires through vision-side LoRA."
          echo "    Both adapters' vision encoder + merger LoRA train during RL."
          echo "  - LoRA rank ${LORA_R:-64} (full capacity)."
          echo "  - GDPO normalization ON, Dr.GRPO loss OFF."
          echo "  - Rewards (simplified two-adapter regime):"
          echo "      A2:   correctness=${W_A2_CORRECTNESS:-0.45}  format=${W_A2_FORMAT:-0.05}"
          echo "      F1:   verification=${W_VERIFICATION_ACCURACY:-0.45}"
          echo "            format=${W_FB_FORMAT:-0.05}"
          echo "  - Aligns with default veRL / VLM-R1 recipe (vision unfrozen)."
          echo ""
          echo "Memory note: with vision tower trainable, Adam state for the"
          echo "~675M vision parameters adds ~5.4 GB per rank. Combined with"
          echo "vLLM colocate (vllm_gpu_memory_utilization=${VLLM_GPU_MEM:-0.40})"
          echo "this fits comfortably on A100-80GB."
          echo ""
          echo "Model: \${MODEL_ID}"
          echo "Dataset: \${DATASET_PATH}"
          echo "Output: \${OUTPUT_DIR}"
          echo "GPUs: \${NUM_GPUS}"
          echo "Branch: \${GIT_BRANCH:-two-adapters}"
          echo "========================================="

          nvidia-smi
          echo ""

          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-two-adapters}"
          pip install -e . 2>&1 | tail -3

          mkdir -p "${OUTPUT_DIR}"

          # NOTE: --freeze_vision_tower is INTENTIONALLY ABSENT — vision tower
          # base weights remain trainable. Routing has no frozen_lora_patterns,
          # so visual LoRA on both adapters also trains.
          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --use_vllm \
            --use_vllm_native_loss \
            --use_think_answer_tags \
            --use_rescaled_rewards \
            --use_dynamic_sampling \
            --use_gdpo_normalization \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-5e-6} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-100} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-1} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-700.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-40.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-40.0} \
            --separate_turn_loss \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.28} \
            --loss_type ${LOSS_TYPE:-grpo} \
            --lora_r ${LORA_R:-64} \
            --lora_alpha ${LORA_ALPHA:-128} \
            --max_pixels ${MAX_PIXELS:-401408} \
            --min_pixels ${MIN_PIXELS:-200704} \
            --w_a1_correctness 0.0 \
            --w_a1_format 0.0 \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.45} \
            --w_a2_format ${W_A2_FORMAT:-0.05} \
            --w_no_regression 0.0 \
            --w_downstream 0.0 \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.45} \
            --w_fb_format ${W_FB_FORMAT:-0.05} \
            --reward_shaping_alpha ${REWARD_SHAPING_ALPHA:-1.0} \
            --response_alpha ${RESPONSE_ALPHA:-1.0} \
            --feedback_alpha ${FEEDBACK_ALPHA:-1.0} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_2a_gdpo_vtrainable"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        - name: INIT_CHECKPOINT
          value: ""

        # No frozen_lora_patterns — vision-side LoRA on both adapters trains.
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "response", "f1": "feedback", "a2": "response"}, "adapters": [{"name": "response", "trainable": true, "init_from_checkpoint": "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"}, {"name": "feedback", "trainable": true}]}

        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "700.0"
        - name: A2_KL_COEFF
          value: "40.0"
        - name: FB_KL_COEFF
          value: "40.0"

        - name: K_SAMPLES
          value: "12"
        - name: LOSS_TYPE
          value: "grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.28"
        - name: INNER_EPOCHS
          value: "1"

        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        - name: LEARNING_RATE
          value: "5e-6"
        - name: LR_WARMUP_STEPS
          value: "100"
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "1"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # LoRA r=64 — full capacity. With vision side trainable we want the
        # extra rank to actually exercise that capacity on vision LoRA.
        - name: LORA_R
          value: "64"
        - name: LORA_ALPHA
          value: "128"

        - name: VLLM_GPU_MEM
          value: "0.40"
        - name: GIT_BRANCH
          value: "two-adapters"

        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        - name: MAX_PIXELS
          value: "401408"
        - name: MIN_PIXELS
          value: "200704"

        - name: REWARD_SHAPING_ALPHA
          value: "1.0"
        - name: RESPONSE_ALPHA
          value: "1.0"
        - name: FEEDBACK_ALPHA
          value: "1.0"

        - name: W_A2_CORRECTNESS
          value: "0.45"
        - name: W_A2_FORMAT
          value: "0.05"
        - name: W_VERIFICATION_ACCURACY
          value: "0.45"
        - name: W_FB_FORMAT
          value: "0.05"

        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        - name: VLM_USE_LLM_JUDGE
          value: "0"

        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-2a-gdpo-vision-trainable"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
