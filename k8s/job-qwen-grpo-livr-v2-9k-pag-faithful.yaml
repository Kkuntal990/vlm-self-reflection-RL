apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-pag-1a-k8
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-pag-faithful
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -eo pipefail
          echo "========================================="
          echo "PAG-faithful (arXiv:2506.10406) — single-adapter pivot"
          echo ""
          echo "Key features:"
          echo "  1. SINGLE adapter shared by A1, F1, A2. The verifier (F1)"
          echo "     and reasoner (A1/A2) live in the SAME LoRA weights, so"
          echo "     F1's verdict cannot drift to a marginal policy decoupled"
          echo "     from A1/A2 confidence (the two-adapter sycophancy mode)."
          echo "  2. Selective revision gate: F1 boxed verdict CORRECT -> no A2."
          echo "     A2 excluded from K-group baseline + policy loss (PAG \xa73.1)."
          echo "  3. Per-segment binary {0,1} rewards (PAG composition):"
          echo "       r_a1 = 0.9*R_a1_corr_01 + 0.1*R_a1_fmt"
          echo "       r_a2 = 0.9*R_a2_corr_01 + 0.1*R_a2_fmt + alpha*(R_a2_corr_01 - R_a1_corr_01)"
          echo "       r_f1 = 0.9*R_verification_01 + 0.1*R_fb_fmt"
          echo "     alpha = ${PAG_SHAPING_ALPHA:-1.0} (PAG's rs_coef=1)."
          echo "  4. A1 UNFROZEN + KL-anchored on baseline-A1 ckpt-1000."
          echo "     A1_KL_COEFF=${A1_KL_COEFF:-220} uniform with A2/F1."
          echo "  5. K = ${K_SAMPLES:-8} (was 12 in two-adapter scaffold;"
          echo "     compute saved by sharing one forward across turns)."
          echo ""
          echo "Vanilla GRPO + symmetric PPO clip 0.2. No DAPO, no GDPO."
          echo "Audit cleanup landed: A2 PPO temperature fix (Bug #1),"
          echo "a2_reward_mean dilution fix (Bug #3), R_no_regression deleted."
          echo ""
          echo "Reward consumption path:"
          echo "  rollout.py routes to compute_pag_response_breakdown and"
          echo "  compute_pag_feedback_breakdown. Trainer's PAG branch reads"
          echo "  PAGSegmentRewardBreakdown.r_a1 / .r_a2 / .gated and computes"
          echo "  per-segment K-group baselines: A1 baseline over all K samples,"
          echo "  A2 baseline over the non-gated subset only. Gated trajectories"
          echo "  receive A2 advantage = 0; their empty A2 completion naturally"
          echo "  contributes 0 to the A2 policy loss via sum/max_len."
          echo ""
          echo "Model: \${MODEL_ID}"
          echo "Dataset: \${DATASET_PATH}"
          echo "Output: \${OUTPUT_DIR}"
          echo "GPUs: \${NUM_GPUS}"
          echo "Branch: \${GIT_BRANCH:-pag-faithful}"
          echo "========================================="

          nvidia-smi
          echo ""

          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-pag-faithful}"
          pip install -e . 2>&1 | tail -3

          mkdir -p "${OUTPUT_DIR}"

          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --use_vllm \
            --use_pag_segment_rewards \
            --use_selective_revision \
            --pag_shaping_alpha ${PAG_SHAPING_ALPHA:-1.0} \
            --separate_turn_loss \
            --ref_model_init_from_checkpoint ${REF_MODEL_INIT_FROM_CHECKPOINT:-/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000} \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-56} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-8} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-220.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-220.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-220.0} \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.2} \
            --loss_type ${LOSS_TYPE:-grpo} \
            --lora_r ${LORA_R:-16} \
            --lora_alpha ${LORA_ALPHA:-32} \
            --w_a1_correctness ${W_A1_CORRECTNESS:-0.9} \
            --w_a1_format ${W_A1_FORMAT:-0.1} \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.9} \
            --w_a2_format ${W_A2_FORMAT:-0.1} \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.9} \
            --w_fb_format ${W_FB_FORMAT:-0.1} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_pag_1a_k8"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        - name: INIT_CHECKPOINT
          value: ""

        # === Adapter routing ===
        # SINGLE adapter shared by A1, F1, and A2. Pivot from the prior
        # two-adapter scaffold — single-adapter restores internal consistency
        # between the verifier (F1) and the reasoner (A1/A2): F1's verdict
        # gradient and A1/A2's policy gradient flow through the SAME LoRA
        # weights, so F1 can no longer drift to a marginal "always CORRECT"
        # policy decoupled from the response head's actual confidence.
        # Inherits from baseline-A1 ckpt-1000; visual LoRA stays frozen.
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "shared", "f1": "shared", "a2": "shared"}, "adapters": [{"name": "shared", "trainable": true, "init_from_checkpoint": "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"}], "frozen_lora_patterns": ["visual"]}

        # PAG-faithful arm — α = 1.0 (paper default)
        - name: PAG_SHAPING_ALPHA
          value: "1.0"

        # KL reference: anchor A1 KL against baseline-A1 ckpt-1000 (the
        # 61.4% BLINK policy), NOT the raw Qwen base. Without this flag the
        # trainer falls back to disable_adapter_layers() which anchors
        # against the base model — A1_KL_COEFF=2500 would then be a 2.5x
        # leash around the base distribution, not baseline-A1. The
        # checkpoint also feeds the response adapter init (same path in
        # ADAPTER_ROUTING_JSON above) so the active and reference policies
        # start identical and KL is 0 at step 0.
        - name: REF_MODEL_INIT_FROM_CHECKPOINT
          value: "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"

        # KL anchor — uniform across A1/A2/F1 since A1 is actively trained
        # (no freeze). The earlier 2500x anchor on A1 was tuned for the
        # anchored-only mode and over-suppressed A1 updates; matching A2/F1
        # gives A1 the same headroom while still anchoring to baseline-A1.
        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "220.0"
        - name: A2_KL_COEFF
          value: "220.0"
        - name: FB_KL_COEFF
          value: "220.0"

        # Vanilla GRPO with symmetric PPO clip. NO DAPO (no dynamic sampling,
        # no clip-higher), NO GDPO (PAG uses RoleAdvNorm; two-adapter routing
        # provides role-isolation at the parameter level).
        - name: K_SAMPLES
          value: "8"
        - name: LOSS_TYPE
          value: "grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.2"
        - name: INNER_EPOCHS
          value: "1"

        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "384"
        - name: A1_MAX_COMPLETION
          value: "384"
        - name: F1_MAX_COMPLETION
          value: "384"
        - name: A2_MAX_COMPLETION
          value: "384"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        - name: LEARNING_RATE
          value: "1e-5"
        - name: LR_WARMUP_STEPS
          value: "56"
        # batch=2, grad_acc=8 → effective batch = 2×8×4 = 64 (unchanged).
        # Restored from the batch=1 / grad_acc=16 OOM-mitigation config after
        # the shared-base KL ref refactor (commit landing this YAML change)
        # freed ~15 GB / rank that the duplicate-base ref model was holding.
        # max_completion 512 → 384 also reverted (matches the originally
        # working config). Activation peak now fits with VLLM_GPU_MEM=0.30.
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "8"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # LoRA r/α match baseline-A1 ckpt-1000 (single adapter inherits its
        # weights via init_from_checkpoint above, so dimensions must agree).
        - name: LORA_R
          value: "64"
        - name: LORA_ALPHA
          value: "128"

        - name: VLLM_GPU_MEM
          # 0.30 restored after the shared-base KL ref refactor returned
          # ~15 GB / rank to the training-side budget. The prior 0.25 was an
          # OOM mitigation when the duplicate-base ref model + 512-tok
          # completions + r=64 single adapter were all in play simultaneously.
          # With the ref model now a frozen LoRA (~50 MB) the training side
          # has the headroom for batch=2 + 384-tok completions at 0.30.
          # NOTE: do NOT switch to PYTORCH_ALLOC_CONF=expandable_segments:True
          # on vLLM 0.12.x — incompatible with sleep-mode CuMemAllocator
          # (commit eefeb7c, c65eeb8). The fix landed in vLLM 0.20.1 (PR
          # #40812) and would need a CUDA-13 docker image rebuild to use.
          value: "0.30"
        - name: GIT_BRANCH
          value: "grpo-kl-ref-fix"

        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        # PAG-binary reward weights (per user spec):
        # Response: 0.9 corr + 0.1 fmt (per segment). Shaping bonus added
        # to A2 only via --pag_shaping_alpha, NOT controlled by w_no_regression
        # (which the PAG composer ignores; kept at 0 for safety).
        # Feedback: 0.9 verification + 0.1 format. Downstream zeroed.
        - name: W_A1_CORRECTNESS
          value: "0.9"
        - name: W_A1_FORMAT
          value: "0.1"
        - name: W_A2_CORRECTNESS
          value: "0.9"
        - name: W_A2_FORMAT
          value: "0.1"
        - name: W_VERIFICATION_ACCURACY
          value: "0.9"
        - name: W_FB_FORMAT
          value: "0.1"

        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          # Lowered from 250 → 100 after the previous run OOM'd at step ~17
          # with no checkpoint saved. 100 steps ≈ 30 min of training, gives
          # us a recoverable state much sooner if vLLM OOMs again.
          value: "100"
        - name: SEED
          value: "42"

        - name: VLM_USE_LLM_JUDGE
          value: "0"

        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: ""
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-pag-1a-k8"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
