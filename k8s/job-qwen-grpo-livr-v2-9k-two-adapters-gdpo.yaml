apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-two-adapters-gdpo
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-two-adapters-gdpo
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -e
          echo "========================================="
          echo "two-adapters-gdpo: Qwen2.5-VL-7B + Pattern A + per-turn LoRA routing"
          echo ""
          echo "Variant vs the two-adapters baseline:"
          echo "  - LOSS_TYPE = grpo (vanilla GRPO, std normalization ON)."
          echo "  - --use_gdpo_normalization ON: per-component K-group normalize"
          echo "    -> weighted sum -> batch-renormalize (Liu 2026, arXiv:2601.05242)."
          echo "    GDPO ignores --separate_turn_loss for the response head (the"
          echo "    GDPO branch sets a1_advantages/a2_advantages to None, so the"
          echo "    trainer falls back to the joint-loss path)."
          echo ""
          echo "Setup:"
          echo "  - TWO trainable LoRA adapters:"
          echo "      * 'response' active for A1 and A2 turns (A1 has w_a1=0)."
          echo "      * 'feedback' active for F1 (verdict + format reward)."
          echo "    Both initialised from BASE Qwen weights."
          echo "  - HIGH A1 KL anchor (KL_COEFF * A1_KL_COEFF = ${KL_COEFF:-0.001} *"
          echo "    ${A1_KL_COEFF:-700} = ~7e-1 effective)."
          echo "  - Rewards:"
          echo "      A2:   correctness=${W_A2_CORRECTNESS:-0.45}  format=${W_A2_FORMAT:-0.05}"
          echo "      F1:   verification=${W_VERIFICATION_ACCURACY:-0.45}"
          echo "            format=${W_FB_FORMAT:-0.05}"
          echo "      A1, no_regression, downstream  ALL ZERO."
          echo "  - --use_vllm_native_loss ON."
          echo ""
          echo "Model: ${MODEL_ID}"
          echo "Dataset: ${DATASET_PATH}"
          echo "Output: ${OUTPUT_DIR}"
          echo "GPUs: ${NUM_GPUS}"
          echo "Branch: ${GIT_BRANCH:-two-adapters}"
          echo "========================================="

          # GPU check
          nvidia-smi
          echo ""

          # Pin vllm to 0.12.0 — newer versions drag torch 2.11 + transformers
          # 5.x which break the Qwen2.5-VL vision encoder forward (NVRTC kernel
          # JIT fails on image_grid_thw.prod(-1)). Leave torch/transformers at
          # the trl:0.29.0 image's defaults.
          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          # Clone and install project. Pins to the two-adapters branch which
          # carries the AdapterRoutingConfig / multi_adapter init code.
          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-two-adapters}"
          pip install -e . 2>&1 | tail -3

          # Create output dir
          mkdir -p "${OUTPUT_DIR}"

          # Run training. Same wiring as the two-adapters baseline, but with
          # --use_gdpo_normalization and LOSS_TYPE=grpo (vanilla).
          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --use_vllm \
            --use_vllm_native_loss \
            --use_think_answer_tags \
            --use_rescaled_rewards \
            --use_gdpo_normalization \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-100} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-1} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-700.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-1.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-1.0} \
            --separate_turn_loss \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.28} \
            --loss_type ${LOSS_TYPE:-grpo} \
            --lora_r ${LORA_R:-64} \
            --lora_alpha ${LORA_ALPHA:-128} \
            --freeze_vision_tower \
            --max_pixels ${MAX_PIXELS:-401408} \
            --min_pixels ${MIN_PIXELS:-200704} \
            --w_a1_correctness 0.0 \
            --w_a1_format 0.0 \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.45} \
            --w_a2_format ${W_A2_FORMAT:-0.05} \
            --w_no_regression 0.0 \
            --w_downstream 0.0 \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.45} \
            --w_fb_format ${W_FB_FORMAT:-0.05} \
            --reward_shaping_alpha ${REWARD_SHAPING_ALPHA:-1.0} \
            --response_alpha ${RESPONSE_ALPHA:-1.0} \
            --feedback_alpha ${FEEDBACK_ALPHA:-1.0} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        # Model and data
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_two_adapters_gdpo"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        # Empty = no resume; this run starts from base Qwen weights. To resume
        # a crashed run, set INIT_CHECKPOINT to a per-adapter checkpoint dir
        # (e.g. ".../checkpoint-250"); the trainer's
        # _load_adapter_weights_from_checkpoint helper iterates the trainable
        # adapter names and loads each from <ckpt>/<adapter_name>/.
        - name: INIT_CHECKPOINT
          value: ""

        # === Adapter routing ===
        # Same as the two-adapters baseline.
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "response", "f1": "feedback", "a2": "response"}, "adapters": [{"name": "response", "trainable": true}, {"name": "feedback", "trainable": true}]}

        # KL anchor — identical to the two-adapters baseline so the GDPO/Dr.GRPO
        # comparison stays apples-to-apples on the regularization side.
        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "700.0"
        - name: A2_KL_COEFF
          value: "1.0"
        - name: FB_KL_COEFF
          value: "1.0"

        # GRPO core
        # ---------
        # Vanilla GRPO (std normalization) + GDPO per-component normalization.
        # GDPO does its own per-component K-group normalize then batch-renorm,
        # which is conceptually distinct from Dr.GRPO's "drop the std division"
        # fix — the two are intentionally exclusive in this variant. K=12
        # mirrors the baseline; DAPO clip-higher (0.28) stays on.
        - name: K_SAMPLES
          value: "12"
        - name: LOSS_TYPE
          value: "grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.28"
        - name: INNER_EPOCHS
          value: "1"

        # Generation
        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        # Optimization
        - name: LEARNING_RATE
          value: "1e-5"
        - name: LR_WARMUP_STEPS
          value: "100"
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "1"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # LoRA (both adapters share these settings; the routing config builds
        # both with the same LoraConfig)
        - name: LORA_R
          value: "64"
        - name: LORA_ALPHA
          value: "128"

        # vLLM
        - name: VLLM_GPU_MEM
          value: "0.40"
        - name: GIT_BRANCH
          value: "two-adapters"

        # === User-message instruction text (Pattern A) ===
        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        # Qwen2.5-VL image resolution
        - name: MAX_PIXELS
          value: "401408"
        - name: MIN_PIXELS
          value: "200704"

        # Reward shaping
        # --------------
        # α=1 is set for log readability; W_NO_REGRESSION and W_DOWNSTREAM are
        # both 0 so the shaping multipliers do not enter the loss.
        - name: REWARD_SHAPING_ALPHA
          value: "1.0"
        - name: RESPONSE_ALPHA
          value: "1.0"
        - name: FEEDBACK_ALPHA
          value: "1.0"

        # Reward weights — A2 correctness/format on the response head,
        # F1 verification/format on the feedback head. Everything else zero.
        - name: W_A2_CORRECTNESS
          value: "0.45"
        - name: W_A2_FORMAT
          value: "0.05"
        - name: W_VERIFICATION_ACCURACY
          value: "0.45"
        - name: W_FB_FORMAT
          value: "0.05"

        # Logging
        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        # LLM Judge disabled for MCQ
        - name: VLM_USE_LLM_JUDGE
          value: "0"

        # HuggingFace
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        # Python and CUDA
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: ""
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-two-adapters-gdpo"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
