apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-9k-stage1
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-stage1
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -e
          echo "========================================="
          echo "Critic-first Stage I: train F1 calibration, freeze A2"
          echo "Start weights: ${MODEL_ID} (base Instruct checkpoint)"
          echo "Model: ${MODEL_ID}"
          echo "Dataset: ${DATASET_PATH}"
          echo "Output: ${OUTPUT_DIR}"
          echo "GPUs: ${NUM_GPUS}"
          echo "========================================="

          # GPU check
          nvidia-smi
          echo ""

          # Install dependencies
          pip install "vllm>=0.12.0" wandb sentence-transformers 2>&1 | tail -5

          # Clone and install project
          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-feature/two-stage-critic-first}"
          pip install -e . 2>&1 | tail -3

          # Create output dir
          mkdir -p "${OUTPUT_DIR}"

          # Run training
          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --use_vllm \
            --use_think_answer_tags \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.50} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-8} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-1} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.02} \
            --a1_kl_coeff ${A1_KL_COEFF:-50.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-1.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-1.0} \
            ${SEPARATE_TURN_LOSS:+--separate_turn_loss} \
            --clip_range ${CLIP_RANGE:-0.2} \
            --loss_type ${LOSS_TYPE:-dr_grpo} \
            --lora_r ${LORA_R:-64} \
            --lora_alpha ${LORA_ALPHA:-128} \
            --freeze_vision_tower \
            --max_pixels ${MAX_PIXELS:-401408} \
            --min_pixels ${MIN_PIXELS:-200704} \
            --w_a1_correctness ${W_A1_CORRECTNESS:-0.27} \
            --w_a1_format ${W_A1_FORMAT:-0.03} \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.27} \
            --w_a2_format ${W_A2_FORMAT:-0.03} \
            --w_no_regression ${W_NO_REGRESSION:-0.40} \
            --w_downstream ${W_DOWNSTREAM:-0.25} \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.65} \
            --w_fb_format ${W_FB_FORMAT:-0.1} \
            --reward_shaping_alpha ${REWARD_SHAPING_ALPHA:-1.0} \
            --response_alpha ${RESPONSE_ALPHA:-1.0} \
            --feedback_alpha ${FEEDBACK_ALPHA:-1.0} \
            --freeze_a1_steps ${FREEZE_A1_STEPS:-0} \
            --freeze_a2_steps ${FREEZE_A2_STEPS:-99999} \
            ${REF_ADAPTER_PATH:+--ref_adapter_path "$REF_ADAPTER_PATH"} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${RESUME_CHECKPOINT:+--resume_from_checkpoint "$RESUME_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        # Model and data
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_data/livr_perception_mcq_hightrust_v2.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_stage1"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"

        # Stage I: train F1 critic, anchor A1 with high KL, freeze A2 policy loss.
        # A1/F1 still update; A2 is held fixed so the critic's downstream signal
        # is measured against a stable refiner.
        - name: SEPARATE_TURN_LOSS
          value: "1"
        - name: KL_COEFF
          value: "0.02"
        - name: A1_KL_COEFF
          value: "50.0"
        - name: A2_KL_COEFF
          value: "1.0"
        - name: FB_KL_COEFF
          value: "1.0"

        # Policy-loss freeze: A2 stays at base for the entire run.
        - name: FREEZE_A1_STEPS
          value: "0"
        - name: FREEZE_A2_STEPS
          value: "99999"

        # Stage I: no ref adapter (KL anchors to base model).
        - name: REF_ADAPTER_PATH
          value: ""

        # GRPO core
        - name: K_SAMPLES
          value: "8"
        - name: LOSS_TYPE
          value: "dr_grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: INNER_EPOCHS
          value: "1"

        # Generation
        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        # Optimization
        - name: LEARNING_RATE
          value: "1e-5"
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "1"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # LoRA
        - name: LORA_R
          value: "64"
        - name: LORA_ALPHA
          value: "128"

        # vLLM
        - name: VLLM_GPU_MEM
          value: "0.50"
        - name: GIT_BRANCH
          value: "feature/two-stage-critic-first"

        # Pattern A prompting (same as v10-base)
        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        # Qwen2.5-VL image resolution
        - name: MAX_PIXELS
          value: "401408"
        - name: MIN_PIXELS
          value: "200704"

        # Shaping alpha: response shaped reward irrelevant when A2 is frozen,
        # but alpha on the feedback side still drives F1's downstream-aware reward.
        - name: REWARD_SHAPING_ALPHA
          value: "1.0"
        - name: RESPONSE_ALPHA
          value: "1.0"
        - name: FEEDBACK_ALPHA
          value: "1.0"

        # Response weights (Stage I): A1 is the only trainable response head
        # (A2 frozen). Pure A1 signal — correctness + format. Zero out all A2
        # and no_regression components so the advantage is not contaminated
        # by signals tied to a frozen refiner. Sum = 1.00.
        - name: W_A1_CORRECTNESS
          value: "0.90"
        - name: W_A1_FORMAT
          value: "0.10"
        - name: W_A2_CORRECTNESS
          value: "0.00"
        - name: W_A2_FORMAT
          value: "0.00"
        - name: W_NO_REGRESSION
          value: "0.00"

        # Feedback weights (Stage I): pure calibration + format. Downstream
        # zeroed because F1 runs before A2 in the rollout (A1 → F1 → A2) and
        # A2 is frozen — downstream reward depends on how base-A2 happens to
        # react to F1 phrasings, which is a noisy, non-stationary signal.
        # Sum = 1.00.
        - name: W_DOWNSTREAM
          value: "0.00"
        - name: W_VERIFICATION_ACCURACY
          value: "0.90"
        - name: W_FB_FORMAT
          value: "0.10"

        - name: RESUME_CHECKPOINT
          value: ""

        # Logging
        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        - name: VLM_USE_LLM_JUDGE
          value: "0"

        # HuggingFace
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        # Python and CUDA
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: ""
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-stage1-critic-first"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
