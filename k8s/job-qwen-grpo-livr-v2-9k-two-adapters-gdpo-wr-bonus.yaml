apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-2a-gdpo-wr-bonus
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-2a-gdpo-wr-bonus
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -eo pipefail
          echo "========================================="
          echo "two-adapters GDPO + WR-bonus variant"
          echo ""
          echo "Reward design (Option 5 in literature menu):"
          echo "  Response = 0.9·R_a2_correctness + 0.05·R_a1_format"
          echo "           + 0.05·R_a2_format + 1.0·R_wr_bonus"
          echo "    where R_wr_bonus = 1 iff (A1 wrong AND A2 right), else 0."
          echo "  Quadrant table (format passes assumed): "
          echo "    RR=1.0  WR=2.0  RW=0.1  WW=0.1"
          echo "  Difference vs no_regression shaping: NO RW penalty. The"
          echo "  WR bonus is purely additive — promotes refinement without"
          echo "  punishing regression, so model has no incentive to exploit"
          echo "  RR-via-copy paths but also no incentive to actively degrade A1."
          echo ""
          echo "  Feedback (unchanged from single-fb-only-gdpo):"
          echo "    verification=0.45  fb_format=0.05  downstream=0"
          echo ""
          echo "A1 anchor bumped: A1_KL_COEFF 1500 → 2500 (β_eff ≈ 2.5)."
          echo "  Rationale: the +1 WR bonus tempts the model toward fixing"
          echo "  paths through 'make A1 worse, then refine'. KL=2500 (up 67%)"
          echo "  is the safety margin that keeps A1 anchored to the baseline-"
          echo "  A1 ckpt-1000 distribution. SCoRe Stage I uses β≈0.1, ours"
          echo "  β_eff≈2.5 at typical A1 length 150/386 — 25× their anchor."
          echo ""
          echo "Two-adapter routing (same as -vision-frozen run):"
          echo "  - 'response' init from baseline-A1 ckpt-1000 (61.4% BLINK)."
          echo "    frozen_lora_patterns=['visual'] freezes the merger LoRA."
          echo "  - 'feedback' fresh; exclude_modules='.*visual.*' skips vision."
          echo "  - Vision encoder + merger fully frozen end-to-end."
          echo ""
          echo "GDPO normalization ON, vanilla GRPO loss, DAPO clip-higher 0.28,"
          echo "K=12, grad_acc=8, LR=1e-5 with 56-step warmup, LoRA r=16 α=32."
          echo ""
          echo "Model: \${MODEL_ID}"
          echo "Dataset: \${DATASET_PATH}"
          echo "Output: \${OUTPUT_DIR}"
          echo "GPUs: \${NUM_GPUS}"
          echo "Branch: \${GIT_BRANCH:-grpo-wr-bonus}"
          echo "========================================="

          nvidia-smi
          echo ""

          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-grpo-wr-bonus}"
          pip install -e . 2>&1 | tail -3

          mkdir -p "${OUTPUT_DIR}"

          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --use_vllm \
            --use_vllm_native_loss \
            --use_think_answer_tags \
            --use_rescaled_rewards \
            --use_dynamic_sampling \
            --use_gdpo_normalization \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-56} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-8} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-2500.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-220.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-220.0} \
            --separate_turn_loss \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.28} \
            --loss_type ${LOSS_TYPE:-grpo} \
            --lora_r ${LORA_R:-16} \
            --lora_alpha ${LORA_ALPHA:-32} \
            --max_pixels ${MAX_PIXELS:-401408} \
            --min_pixels ${MIN_PIXELS:-200704} \
            --w_a1_correctness 0.0 \
            --w_a1_format ${W_A1_FORMAT:-0.05} \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.9} \
            --w_a2_format ${W_A2_FORMAT:-0.05} \
            --w_no_regression 0.0 \
            --w_wr_bonus ${W_WR_BONUS:-1.0} \
            --w_downstream 0.0 \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.45} \
            --w_fb_format ${W_FB_FORMAT:-0.05} \
            --reward_shaping_alpha ${REWARD_SHAPING_ALPHA:-1.0} \
            --response_alpha ${RESPONSE_ALPHA:-1.0} \
            --feedback_alpha ${FEEDBACK_ALPHA:-1.0} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_2a_gdpo_wr_bonus"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        # No HF-Trainer-level resume; adapter init is via ADAPTER_ROUTING_JSON.
        - name: INIT_CHECKPOINT
          value: ""

        # === Adapter routing ===
        # Same as the -vision-frozen run: response init from baseline-A1
        # ckpt-1000, feedback fresh, vision side fully frozen via
        # exclude_modules + frozen_lora_patterns.
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "response", "f1": "feedback", "a2": "response"}, "adapters": [{"name": "response", "trainable": true, "init_from_checkpoint": "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"}, {"name": "feedback", "trainable": true}], "frozen_lora_patterns": ["visual"]}

        # KL anchor — A1 bumped 1500 → 2500 (+67%) to compensate for the
        # WR bonus tempting the model toward A1-degrade paths.
        # ---------
        # At typical A1 length 150/386 the per-token effective KL is:
        #   β_eff_A1 = 0.001 * 2500 * (150/386) ≈ 0.972
        # Field reference for first-turn anchor strength:
        #   VLM-R1 LoRA / DocThinker / TRL default:   β = 0.04
        #   SCoRe Stage II β1 (multi-turn joint):     β = 0.01
        #   SCoRe Stage I β2 MATH (frozen first):     β = 0.10
        #   SCoRe Stage I β2 MBPP:                    β = 0.25
        #   THIS RUN  β_eff_A1 ≈ 0.97  (≈9.7× SCoRe MATH, ≈3.9× MBPP)
        # The aggressive anchor is intentional: the WR bonus is +1.0 ON TOP
        # OF the 0.9·a2_correctness signal, so the absolute reward gap
        # between WR and other quadrants is 2.0 vs 0.1 — 10× wider than the
        # gap in the simplified vision-frozen run. Need more KL holding A1.
        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "2500.0"
        - name: A2_KL_COEFF
          value: "220.0"
        - name: FB_KL_COEFF
          value: "220.0"

        # GRPO core — vanilla GRPO loss + GDPO normalization. DAPO clip-higher
        # 0.28 + dynamic sampling. GDPO is especially important here: with
        # one component (wr_bonus) having Bernoulli {0, 1} variance only on
        # the wrong-A1 subset, GDPO's per-component K-group normalization
        # makes the WR bonus gradient signal honest — large enough to matter
        # without being dominated by a2_correctness's noisier signal.
        - name: K_SAMPLES
          value: "12"
        - name: LOSS_TYPE
          value: "grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.28"
        - name: INNER_EPOCHS
          value: "1"

        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        - name: LEARNING_RATE
          value: "1e-5"
        - name: LR_WARMUP_STEPS
          value: "56"
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "8"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        - name: LORA_R
          value: "16"
        - name: LORA_ALPHA
          value: "32"

        - name: VLLM_GPU_MEM
          value: "0.40"
        - name: GIT_BRANCH
          value: "grpo-wr-bonus"

        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        - name: MAX_PIXELS
          value: "401408"
        - name: MIN_PIXELS
          value: "200704"

        - name: REWARD_SHAPING_ALPHA
          value: "1.0"
        - name: RESPONSE_ALPHA
          value: "1.0"
        - name: FEEDBACK_ALPHA
          value: "1.0"

        # === Response reward weights (WR-bonus regime) ===
        - name: W_A1_FORMAT
          value: "0.05"
        - name: W_A2_CORRECTNESS
          value: "0.9"
        - name: W_A2_FORMAT
          value: "0.05"
        - name: W_WR_BONUS
          value: "1.0"
        # === Feedback reward weights (unchanged) ===
        - name: W_VERIFICATION_ACCURACY
          value: "0.45"
        - name: W_FB_FORMAT
          value: "0.05"

        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        - name: VLM_USE_LLM_JUDGE
          value: "0"

        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        - name: PYTHONUNBUFFERED
          value: "1"
        # PYTORCH_CUDA_ALLOC_CONF: explicit empty to override trl:0.29.0's
        # baked-in expandable_segments:True which is incompatible with vLLM.
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: ""
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-2a-gdpo-wr-bonus"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
