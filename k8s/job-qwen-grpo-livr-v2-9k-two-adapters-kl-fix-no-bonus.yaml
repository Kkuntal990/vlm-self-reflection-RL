apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-2a-kl-fix-no-bonus
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-2a-gdpo-wr-bonus-kl-fix
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -eo pipefail
          echo "========================================="
          echo "two-adapters + KL REF FIX + NO WR-BONUS"
          echo ""
          echo "Iteration on the kl-fix arm. Changes:"
          echo "  1. W_WR_BONUS = 0 (removed). The +1 bonus created a perverse"
          echo "     incentive: RR=1.0 reward < WR=2.0 reward, so the model was"
          echo "     rewarded for degrading A1 (conditional on A2 succeeding)."
          echo "     With bonus removed, RR == WR in reward — no incentive to"
          echo "     degrade A1."
          echo "  2. Feedback adapter rank 16 -> 64, alpha 32 -> 128 to match"
          echo "     baseline-A1 / response adapter capacity. Both heads now"
          echo "     same size."
          echo "  3. Response reward weights cleanly sum to 1.0:"
          echo "     0.9 a2_corr + 0.05 a1_fmt + 0.05 a2_fmt = 1.0"
          echo "  4. Feedback reward weights cleanly sum to 1.0:"
          echo "     0.9 verification + 0.1 fb_format = 1.0"
          echo "  5. KL ref fix retained from prior arm:"
          echo "     --ref_model_init_from_checkpoint loads frozen baseline-A1"
          echo "     ckpt-1000 as KL ref distribution. Anchors A1 against the"
          echo "     correct init distribution, not raw base Qwen."
          echo ""
          echo "Model: \${MODEL_ID}"
          echo "Dataset: \${DATASET_PATH}"
          echo "Output: \${OUTPUT_DIR}"
          echo "Ref ckpt: \${REF_INIT_CHECKPOINT}"
          echo "GPUs: \${NUM_GPUS}"
          echo "Branch: \${GIT_BRANCH:-grpo-kl-ref-fix}"
          echo "========================================="

          nvidia-smi
          echo ""

          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-grpo-kl-ref-fix}"
          pip install -e . 2>&1 | tail -3

          mkdir -p "${OUTPUT_DIR}"

          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --ref_model_init_from_checkpoint "${REF_INIT_CHECKPOINT}" \
            --use_vllm \
            --use_rescaled_rewards \
            --use_gdpo_normalization \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-56} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-8} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-220.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-220.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-220.0} \
            --separate_turn_loss \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.2} \
            --loss_type ${LOSS_TYPE:-grpo} \
            --lora_r ${LORA_R:-16} \
            --lora_alpha ${LORA_ALPHA:-32} \
            --w_a1_correctness 0.0 \
            --w_a1_format ${W_A1_FORMAT:-0.05} \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.9} \
            --w_a2_format ${W_A2_FORMAT:-0.05} \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.45} \
            --w_fb_format ${W_FB_FORMAT:-0.05} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_2a_kl_fix_no_bonus"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        - name: INIT_CHECKPOINT
          value: ""

        # === KL reference checkpoint (THE FIX) ===
        # Loads baseline-A1 ckpt-1000 LoRA into a second frozen copy of the
        # base model, merge_and_unload, and passes that as ref_model to the
        # trainer. The KL term in critic_grpo.py:1336 then anchors against
        # THIS distribution instead of falling into the disable_adapter_layers
        # path that produces raw-base logprobs.
        - name: REF_INIT_CHECKPOINT
          value: "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"

        # === Adapter routing ===
        # Same as the original wr-bonus run: response init from baseline-A1
        # ckpt-1000 (so step-0 response output matches the ref), feedback
        # fresh, vision side fully frozen.
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "response", "f1": "feedback", "a2": "response"}, "adapters": [{"name": "response", "trainable": true, "init_from_checkpoint": "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"}, {"name": "feedback", "trainable": true}], "frozen_lora_patterns": ["visual"]}

        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "220.0"
        - name: A2_KL_COEFF
          value: "220.0"
        - name: FB_KL_COEFF
          value: "220.0"

        - name: K_SAMPLES
          value: "12"
        - name: LOSS_TYPE
          value: "grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.2"
        - name: INNER_EPOCHS
          value: "1"

        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        - name: LEARNING_RATE
          value: "1e-5"
        - name: LR_WARMUP_STEPS
          value: "56"
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "8"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # === LoRA rank for fresh adapters (feedback) ===
        # Both adapters now r=64 alpha=128 to match baseline-A1 (which the
        # response adapter inherits from). The CLI lora_r/alpha only applies
        # to fresh adapters via add_adapter — the response adapter loads its
        # own r=64 alpha=128 from baseline-A1's adapter_config.json.
        - name: LORA_R
          value: "64"
        - name: LORA_ALPHA
          value: "128"

        # vLLM gpu_memory_utilization is reduced 0.40 → 0.35 to leave room
        # for the second frozen ref model (~14GB extra on each rank).
        - name: VLLM_GPU_MEM
          value: "0.35"
        - name: GIT_BRANCH
          value: "grpo-kl-ref-fix"

        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        # === Response reward weights (no-bonus regime, convex sum = 1.0) ===
        - name: W_A1_FORMAT
          value: "0.05"
        - name: W_A2_CORRECTNESS
          value: "0.9"
        - name: W_A2_FORMAT
          value: "0.05"
        # === Feedback reward weights (convex sum = 1.0) ===
        - name: W_VERIFICATION_ACCURACY
          value: "0.9"
        - name: W_FB_FORMAT
          value: "0.1"

        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        - name: VLM_USE_LLM_JUDGE
          value: "0"

        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: ""
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-2a-kl-fix-no-bonus"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
