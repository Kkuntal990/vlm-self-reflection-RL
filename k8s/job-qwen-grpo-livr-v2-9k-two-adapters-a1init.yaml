apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-two-adapters-a1init
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-two-adapters-a1init
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -eo pipefail
          echo "========================================="
          echo "two-adapters-a1init: Qwen2.5-VL-7B + Pattern A + per-turn LoRA routing"
          echo ""
          echo "Setup:"
          echo "  - TWO trainable LoRA adapters:"
          echo "      * 'response'  active for A1 and A2 turns. INIT FROM the"
          echo "                    baseline-A1 single-turn checkpoint"
          echo "                    (${RESPONSE_INIT_CHECKPOINT}) — 61.4% BLINK avg,"
          echo "                    +5.3pp over base Qwen. Gives A1 a proven"
          echo "                    starting policy and reduces the cold-start"
          echo "                    drift that contributed to response collapse"
          echo "                    in the prior two_adapters run."
          echo "      * 'feedback'  active for F1 turn. FRESH from base Qwen."
          echo "                    Diverges from response by virtue of training"
          echo "                    on F1 trajectories only."
          echo "  - HIGH A1 KL anchor (KL_COEFF * A1_KL_COEFF = ${KL_COEFF:-0.001} *"
          echo "    ${A1_KL_COEFF:-700} = ~7e-1 effective). With this run the KL"
          echo "    reference is the BASELINE-A1 policy (because the routing"
          echo "    init carries it), not base Qwen — so A1 KL anchors A2 toward"
          echo "    the proven A1 distribution, not the untrained base."
          echo "  - Rewards (same simplified regime as previous two-adapter runs):"
          echo "      A2:   correctness=${W_A2_CORRECTNESS:-0.45}  format=${W_A2_FORMAT:-0.05}"
          echo "      F1:   verification=${W_VERIFICATION_ACCURACY:-0.45}"
          echo "            format=${W_FB_FORMAT:-0.05}"
          echo "      A1, no_regression, downstream  ALL ZERO."
          echo "  - --use_vllm_native_loss ON: vLLM's per-token logprobs serve as old_lp"
          echo "    after every adapter switch (the per-turn rollout callback re-syncs"
          echo "    vLLM weights from the freshly-activated PEFT adapter before each"
          echo "    turn's batched generation)."
          echo ""
          echo "Model: \${MODEL_ID}"
          echo "Dataset: \${DATASET_PATH}"
          echo "Output: \${OUTPUT_DIR}"
          echo "GPUs: \${NUM_GPUS}"
          echo "Branch: \${GIT_BRANCH:-two-adapters}"
          echo "========================================="

          # GPU check
          nvidia-smi
          echo ""

          # Pin vllm to 0.12.0 — newer versions drag torch 2.11 + transformers
          # 5.x which break the Qwen2.5-VL vision encoder forward (NVRTC kernel
          # JIT fails on image_grid_thw.prod(-1)). Leave torch/transformers at
          # the trl:0.29.0 image's defaults.
          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          # Clone and install project. Pins to the two-adapters branch which
          # carries the AdapterRoutingConfig / multi_adapter init code.
          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-two-adapters}"
          pip install -e . 2>&1 | tail -3

          # Create output dir
          mkdir -p "${OUTPUT_DIR}"

          # Run training. The ADAPTER_ROUTING_JSON env wires the per-turn LoRA
          # routing — 'response' loads from RESPONSE_INIT_CHECKPOINT, 'feedback'
          # is fresh from base. init_multi_adapter_model handles both at startup.
          # INIT_CHECKPOINT (HF Trainer resume) stays empty — we are not
          # resuming a prior multi-adapter run; we are bootstrapping fresh from
          # the single-adapter baseline.
          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --use_vllm \
            --use_vllm_native_loss \
            --use_think_answer_tags \
            --use_rescaled_rewards \
            --use_dynamic_sampling \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-100} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-1} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-700.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-1.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-1.0} \
            --separate_turn_loss \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.28} \
            --loss_type ${LOSS_TYPE:-dr_grpo} \
            --lora_r ${LORA_R:-64} \
            --lora_alpha ${LORA_ALPHA:-128} \
            --freeze_vision_tower \
            --max_pixels ${MAX_PIXELS:-401408} \
            --min_pixels ${MIN_PIXELS:-200704} \
            --w_a1_correctness 0.0 \
            --w_a1_format 0.0 \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.45} \
            --w_a2_format ${W_A2_FORMAT:-0.05} \
            --w_no_regression 0.0 \
            --w_downstream 0.0 \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.45} \
            --w_fb_format ${W_FB_FORMAT:-0.05} \
            --reward_shaping_alpha ${REWARD_SHAPING_ALPHA:-1.0} \
            --response_alpha ${RESPONSE_ALPHA:-1.0} \
            --feedback_alpha ${FEEDBACK_ALPHA:-1.0} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        # Model and data
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_two_adapters_a1init"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        # HF-Trainer-level resume — leave empty. Adapter-level init is handled
        # by ADAPTER_ROUTING_JSON below via init_multi_adapter_model().
        - name: INIT_CHECKPOINT
          value: ""

        # === Response-adapter init source ===
        # Path to the baseline-A1 single-turn LoRA checkpoint. Loaded onto the
        # 'response' adapter at init via PeftModel.from_pretrained. The
        # feedback adapter is added fresh from base after that.
        - name: RESPONSE_INIT_CHECKPOINT
          value: "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"

        # === Adapter routing ===
        # Two trainable adapters. 'response' loads from the baseline-A1 ckpt;
        # 'feedback' is fresh from base. The trainer's per-turn callback
        # switches the active adapter (and re-syncs vLLM) before each turn's
        # generation. Inside the training step, _routed_forward_multi groups
        # turns by adapter so A1+A2 still fuse into a single forward pass;
        # F1 runs a separate forward with the feedback adapter active.
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "response", "f1": "feedback", "a2": "response"}, "adapters": [{"name": "response", "trainable": true, "init_from_checkpoint": "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"}, {"name": "feedback", "trainable": true}]}

        # KL anchor
        # ---------
        # Multi-adapter setup. A1 has zero policy-gradient weight on the
        # response adapter (W_A1_*=0), so A1 only moves under the KL term —
        # KL_COEFF * A1_KL_COEFF = 0.001 * 700 = 0.7 (after sum/max_len norm
        # this is ~1.8e-3 per token, mirroring the single-fb-only setup).
        # A2 / F1 KL stay at the standard 1.0 multiplier.
        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "700.0"
        - name: A2_KL_COEFF
          value: "1.0"
        - name: FB_KL_COEFF
          value: "1.0"

        # GRPO core
        # ---------
        # Dr.GRPO. K=12 with DAPO clip-higher (0.28 upper, 0.2 lower) so
        # positive-advantage tokens get more headroom.
        - name: K_SAMPLES
          value: "12"
        - name: LOSS_TYPE
          value: "dr_grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.28"
        - name: INNER_EPOCHS
          value: "1"

        # Generation
        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        # Optimization
        - name: LEARNING_RATE
          value: "1e-5"
        - name: LR_WARMUP_STEPS
          value: "100"
        - name: BATCH_SIZE
          value: "2"
        - name: GRAD_ACC
          value: "1"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # LoRA (both adapters share these settings; the routing config builds
        # both with the same LoraConfig)
        - name: LORA_R
          value: "64"
        - name: LORA_ALPHA
          value: "128"

        # vLLM
        - name: VLLM_GPU_MEM
          value: "0.40"
        - name: GIT_BRANCH
          value: "two-adapters"

        # === User-message instruction text (Pattern A) ===
        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        # Qwen2.5-VL image resolution
        - name: MAX_PIXELS
          value: "401408"
        - name: MIN_PIXELS
          value: "200704"

        # Reward shaping
        # --------------
        # α=1 is set for log readability; W_NO_REGRESSION and W_DOWNSTREAM are
        # both 0 so the shaping multipliers do not enter the loss.
        - name: REWARD_SHAPING_ALPHA
          value: "1.0"
        - name: RESPONSE_ALPHA
          value: "1.0"
        - name: FEEDBACK_ALPHA
          value: "1.0"

        # Reward weights — A2 correctness/format on the response head,
        # F1 verification/format on the feedback head. Everything else zero.
        - name: W_A2_CORRECTNESS
          value: "0.45"
        - name: W_A2_FORMAT
          value: "0.05"
        - name: W_VERIFICATION_ACCURACY
          value: "0.45"
        - name: W_FB_FORMAT
          value: "0.05"

        # Logging
        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        # LLM Judge disabled for MCQ
        - name: VLM_USE_LLM_JUDGE
          value: "0"

        # HuggingFace
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        # Python and CUDA
        - name: PYTHONUNBUFFERED
          value: "1"
        # Defragment GPU memory and absorb the 3x merge_adapter spike per
        # rollout step (each per-turn adapter switch in multi-adapter mode
        # transiently doubles parameter memory during merge_adapter →
        # load_weights → unmerge_adapter). expandable_segments lets the
        # allocator re-use freed blocks without requiring contiguous
        # virtual addresses, eliminating the fragmentation-driven OOM
        # we hit at ~7h45m on the first deploy.
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-two-adapters-a1init"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
