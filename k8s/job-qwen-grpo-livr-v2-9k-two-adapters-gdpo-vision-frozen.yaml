apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-grpo-livr-v2-9k-2a-gdpo-vision-frozen
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: grpo-trainer
        model: qwen2-5-vl-7b
        task: livr-perception-grpo-2a-gdpo-vision-frozen
    spec:
      restartPolicy: Never
      containers:
      - name: trainer
        image: huggingface/trl:0.29.0
        command: ["bash", "-c"]
        args:
        - |
          set -eo pipefail
          echo "========================================="
          echo "two-adapters GDPO + vision-frozen variant"
          echo ""
          echo "Setup — text-decoder-only LoRA training (LIVR/VLM-R1 recipe):"
          echo "  - TWO trainable LoRA adapters; vision side fully frozen."
          echo "      * 'response' (init from baseline-A1 ckpt-1000 — 61.4% BLINK)."
          echo "        baseline-A1 was trained with LoRA on the merger; loading"
          echo "        carries those tensors over. frozen_lora_patterns=[\"visual\"]"
          echo "        forces requires_grad=False on response's visual LoRA so"
          echo "        the merger LoRA does NOT update this run."
          echo "      * 'feedback' is fresh; exclude_modules=\".*visual.*\" tells"
          echo "        PEFT not to wrap visual modules with LoRA at all, so"
          echo "        feedback has no visual LoRA tensors to begin with."
          echo "  - Vision encoder + merger base: frozen by PEFT default"
          echo "    (get_peft_model freezes all non-LoRA base parameters). No"
          echo "    custom freeze code, no --freeze_vision_tower flag needed."
          echo "  - LoRA rank ${LORA_R:-16}, alpha ${LORA_ALPHA:-32} (matches LIVR"
          echo "    recipe; smaller than baseline-A1's r=64 since only the"
          echo "    language decoder is being adapted)."
          echo "  - GDPO normalization ON (per-component K-group advantage"
          echo "    normalize → weighted sum → batch renorm), Dr.GRPO loss OFF."
          echo "  - Rewards (simplified two-adapter regime):"
          echo "      A2:   correctness=${W_A2_CORRECTNESS:-0.45}  format=${W_A2_FORMAT:-0.05}"
          echo "      F1:   verification=${W_VERIFICATION_ACCURACY:-0.45}"
          echo "            format=${W_FB_FORMAT:-0.05}"
          echo "  - --use_vllm_native_loss ON."
          echo ""
          echo "Model: \${MODEL_ID}"
          echo "Dataset: \${DATASET_PATH}"
          echo "Output: \${OUTPUT_DIR}"
          echo "GPUs: \${NUM_GPUS}"
          echo "Branch: \${GIT_BRANCH:-two-adapters}"
          echo "========================================="

          nvidia-smi
          echo ""

          pip install "vllm==0.12.0" wandb sentence-transformers 2>&1 | tail -5

          git clone https://github.com/Kkuntal990/vlm-self-reflection-RL.git /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL
          git checkout "${GIT_BRANCH:-two-adapters}"
          pip install -e . 2>&1 | tail -3

          mkdir -p "${OUTPUT_DIR}"

          accelerate launch \
            --config_file /workspace/vlm-self-reflection-RL/k8s/multi_gpu.yaml \
            --num_processes=${NUM_GPUS:-4} \
            train_self_reflection.py \
            --model_id "${MODEL_ID}" \
            --model_type qwen2vl \
            --dataset_path "${DATASET_PATH}" \
            --output_dir "${OUTPUT_DIR}" \
            --image_base_dir "${IMAGE_BASE_DIR}" \
            --adapter_routing_json "${ADAPTER_ROUTING_JSON}" \
            --use_vllm \
            --use_vllm_native_loss \
            --use_think_answer_tags \
            --use_rescaled_rewards \
            --use_dynamic_sampling \
            --use_gdpo_normalization \
            --vllm_gpu_memory_utilization ${VLLM_GPU_MEM:-0.40} \
            --max_samples ${MAX_SAMPLES:-0} \
            --k_samples ${K_SAMPLES:-12} \
            --max_completion_length ${MAX_COMPLETION_LENGTH:-386} \
            --a1_max_completion_length ${A1_MAX_COMPLETION:-386} \
            --f1_max_completion_length ${F1_MAX_COMPLETION:-386} \
            --a2_max_completion_length ${A2_MAX_COMPLETION:-386} \
            --temperature ${TEMPERATURE:-1.0} \
            --feedback_temperature ${FEEDBACK_TEMPERATURE:-1.0} \
            --a2_temperature ${A2_TEMPERATURE:-0.7} \
            --learning_rate ${LEARNING_RATE:-1e-5} \
            --lr_warmup_steps ${LR_WARMUP_STEPS:-56} \
            --per_device_train_batch_size ${BATCH_SIZE:-2} \
            --gradient_accumulation_steps ${GRAD_ACC:-1} \
            --num_train_epochs ${EPOCHS:-1} \
            --num_inner_epochs ${INNER_EPOCHS:-1} \
            --kl_coeff ${KL_COEFF:-0.001} \
            --a1_kl_coeff ${A1_KL_COEFF:-700.0} \
            --a2_kl_coeff ${A2_KL_COEFF:-40.0} \
            --fb_kl_coeff ${FB_KL_COEFF:-40.0} \
            --separate_turn_loss \
            --clip_range ${CLIP_RANGE:-0.2} \
            --clip_high ${CLIP_HIGH:-0.28} \
            --loss_type ${LOSS_TYPE:-grpo} \
            --lora_r ${LORA_R:-16} \
            --lora_alpha ${LORA_ALPHA:-32} \
            --max_pixels ${MAX_PIXELS:-401408} \
            --min_pixels ${MIN_PIXELS:-200704} \
            --w_a1_correctness 0.0 \
            --w_a1_format 0.0 \
            --w_a2_correctness ${W_A2_CORRECTNESS:-0.45} \
            --w_a2_format ${W_A2_FORMAT:-0.05} \
            --w_no_regression 0.0 \
            --w_downstream 0.0 \
            --w_verification_accuracy ${W_VERIFICATION_ACCURACY:-0.45} \
            --w_fb_format ${W_FB_FORMAT:-0.05} \
            --reward_shaping_alpha ${REWARD_SHAPING_ALPHA:-1.0} \
            --response_alpha ${RESPONSE_ALPHA:-1.0} \
            --feedback_alpha ${FEEDBACK_ALPHA:-1.0} \
            --logging_steps ${LOGGING_STEPS:-10} \
            --save_steps ${SAVE_STEPS:-250} \
            --seed ${SEED:-42} \
            --debug \
            ${INIT_CHECKPOINT:+--resume_from_checkpoint "$INIT_CHECKPOINT"} \
            2>&1 | tee -a "${OUTPUT_DIR}/training.log"

          echo "=== Training complete ==="

        env:
        - name: MODEL_ID
          value: "Qwen/Qwen2.5-VL-7B-Instruct"
        - name: DATASET_PATH
          value: "/outputs/livr_v2_train_snapshots/snap_20260501_154345_final/data/livr_v2_9task_train.jsonl"
        - name: OUTPUT_DIR
          value: "/outputs/grpo_qwen_livr_v2_9k_2a_gdpo_vfrozen"
        - name: IMAGE_BASE_DIR
          value: "/outputs/image_base"
        # No HF-Trainer-level resume; adapter init is via ADAPTER_ROUTING_JSON.
        - name: INIT_CHECKPOINT
          value: ""

        # === Adapter routing ===
        # response: init from baseline-A1 ckpt-1000. feedback: fresh from base.
        # frozen_lora_patterns=["visual"] forces requires_grad=False on every
        # LoRA tensor whose path contains "visual" — i.e. the vision encoder
        # AND the merger MLP — across BOTH adapters. Combined with
        # --freeze_vision_tower freezing the base weights, this gives a
        # fully-frozen vision side (matching LIVR-paper recipe).
        - name: ADAPTER_ROUTING_JSON
          value: |
            {"turns": {"a1": "response", "f1": "feedback", "a2": "response"}, "adapters": [{"name": "response", "trainable": true, "init_from_checkpoint": "/outputs/grpo_qwen_livr_v2_9k_baseline_a1/checkpoint-1000"}, {"name": "feedback", "trainable": true}], "frozen_lora_patterns": ["visual"]}

        # KL anchor — see two-adapters-a1init's predecessor for the lit
        # comparison. A1 effective β=0.7 (anchors the W_A1=0 turn). A2 / F1
        # effective β=0.04, matching VLM-R1, DocThinker, TRL default.
        - name: KL_COEFF
          value: "0.001"
        - name: A1_KL_COEFF
          value: "700.0"
        - name: A2_KL_COEFF
          value: "40.0"
        - name: FB_KL_COEFF
          value: "40.0"

        # GRPO core — vanilla GRPO loss + GDPO normalization. DAPO clip-higher
        # 0.28 + dynamic sampling.
        - name: K_SAMPLES
          value: "12"
        - name: LOSS_TYPE
          value: "grpo"
        - name: CLIP_RANGE
          value: "0.2"
        - name: CLIP_HIGH
          value: "0.28"
        - name: INNER_EPOCHS
          value: "1"

        - name: MAX_SAMPLES
          value: "0"
        - name: MAX_COMPLETION_LENGTH
          value: "386"
        - name: A1_MAX_COMPLETION
          value: "386"
        - name: F1_MAX_COMPLETION
          value: "386"
        - name: A2_MAX_COMPLETION
          value: "386"
        - name: TEMPERATURE
          value: "1.0"
        - name: FEEDBACK_TEMPERATURE
          value: "1.0"
        - name: A2_TEMPERATURE
          value: "0.7"

        # LR=1e-5: matches VLM-R1 LoRA recipe (run_grpo_rec_lora.sh) and SCoRe
        # MBPP. Higher than the 5e-6 used in the prior crashed two-adapter
        # runs, but paired with tighter KL anchor (A2/F1 β=0.04 vs prior 1e-6)
        # the trust region constrains drift.
        - name: LEARNING_RATE
          value: "1e-5"
        # Warmup = 5% of total outer steps. With dataset=9000 prompts,
        # per_device_train_batch_size=2, num_gpus=4, grad_acc=1 → effective
        # batch=8 prompts → 1125 outer steps for 1 epoch. 5% ≈ 56 steps.
        - name: LR_WARMUP_STEPS
          value: "56"
        - name: BATCH_SIZE
          value: "2"
        # GRAD_ACC: currently NOT wired into the GRPO trainer's outer loop
        # (only used by HF Trainer's optimizer.step()). The CLI flag exists
        # and is stored on SelfReflectionConfig but critic_grpo.py does not
        # consult it — every outer step calls optimizer.step() unconditionally.
        # Setting GRAD_ACC>1 here is therefore currently a no-op; the
        # effective batch is per_device_train_batch_size × num_gpus × K=12
        # = 96 trajectories per gradient update regardless. If we want to
        # accumulate across outer steps in future, the inner-loop's
        # zero_grad/step calls in critic_grpo.py:1424/1730 need to be gated
        # on (global_step % grad_acc == 0).
        - name: GRAD_ACC
          value: "1"
        - name: EPOCHS
          value: "1"
        - name: NUM_GPUS
          value: "4"

        # LoRA r=16, alpha=32 (alpha/r = 2.0). Matches the LIVR paper recipe
        # exactly (r=16). VLM-R1 LoRA recipe uses r=64; the smaller rank here
        # is appropriate when only the language decoder is being adapted.
        - name: LORA_R
          value: "16"
        - name: LORA_ALPHA
          value: "32"

        - name: VLLM_GPU_MEM
          value: "0.40"
        - name: GIT_BRANCH
          value: "two-adapters"

        - name: THINK_ANSWER_INSTRUCTION
          value: |
            The reasoning process MUST BE enclosed within <think> </think> tags. The final answer MUST BE put in <answer> </answer> tags.
        - name: F1_VERIFIER_INSTRUCTION
          value: |
            Re-examine the image and determine whether the candidate answer is correct or incorrect. The reasoning process MUST BE enclosed within <think> </think> tags. The final verdict MUST BE put in \boxed{} as either CORRECT or INCORRECT.

        - name: MAX_PIXELS
          value: "401408"
        - name: MIN_PIXELS
          value: "200704"

        - name: REWARD_SHAPING_ALPHA
          value: "1.0"
        - name: RESPONSE_ALPHA
          value: "1.0"
        - name: FEEDBACK_ALPHA
          value: "1.0"

        - name: W_A2_CORRECTNESS
          value: "0.45"
        - name: W_A2_FORMAT
          value: "0.05"
        - name: W_VERIFICATION_ACCURACY
          value: "0.45"
        - name: W_FB_FORMAT
          value: "0.05"

        - name: LOGGING_STEPS
          value: "10"
        - name: SAVE_STEPS
          value: "250"
        - name: SEED
          value: "42"

        - name: VLM_USE_LLM_JUDGE
          value: "0"

        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: TORCH_HOME
          value: "/cache/torch"

        - name: PYTHONUNBUFFERED
          value: "1"
        # PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True intentionally NOT
        # set — it's incompatible with vLLM's CuMemAllocator and was the
        # source of the 4-minute pod crash on the first two-adapter deploy.
        - name: NCCL_TIMEOUT
          value: "1800"
        - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
          value: "1800"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: DO_NOT_TRACK
          value: "1"
        - name: VLLM_ENABLE_V1_MULTIPROCESSING
          value: "0"
        - name: WANDB_PROJECT
          value: "vlm-self-reflection-grpo"
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: key
        - name: WANDB_RUN_NAME
          value: "grpo-livr-v2-9k-2a-gdpo-vision-frozen"

        resources:
          limits:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"
          requests:
            nvidia.com/a100: "4"
            memory: "196Gi"
            cpu: "12"

        volumeMounts:
        - name: cache
          mountPath: /cache
        - name: outputs
          mountPath: /outputs
        - name: dev-shm
          mountPath: /dev/shm

      tolerations:
      - key: nautilus.io/reservation
        operator: Exists
        effect: NoSchedule
      - key: nautilus.io/hardware
        operator: Equal
        value: large-gpu
      - effect: PreferNoSchedule
        key: nvidia.com/gpu
        operator: Exists
      - key: nautilus.io/issue
        operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A100-SXM4-80GB

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 200Gi
      - name: outputs
        persistentVolumeClaim:
          claimName: ms-swift-outputs-pvc
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 64Gi
