apiVersion: batch/v1
kind: Job
metadata:
  name: build-livr-v2
  labels:
    app: vlm-grpo
    task: livr-v2-build
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: vlm-grpo
        task: livr-v2-build
    spec:
      restartPolicy: Never
      containers:
      - name: builder
        image: huggingface/trl:0.29.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          echo "============================================="
          echo "LIVR-v2 builder (8 tasks, skip funccorr)"
          echo "============================================="
          nvidia-smi --query-gpu=name,memory.total,memory.free --format=csv
          echo ""

          apt-get update -qq && apt-get install -y -qq wget unzip
          pip install --quiet \
              "datasets>=2.14" \
              "imagehash" \
              "scikit-image" \
              "git+https://github.com/openai/CLIP.git" \
              2>&1 | tail -5

          echo "=== Cloning repo ==="
          git clone --depth 1 --branch "${GIT_BRANCH:-feature/two-stage-critic-first}" \
              https://github.com/Kkuntal990/vlm-self-reflection-RL.git \
              /workspace/vlm-self-reflection-RL
          cd /workspace/vlm-self-reflection-RL

          mkdir -p "${LIVR_V2_DATA_DIR}"
          mkdir -p "${LIVR_V2_IMG_DIR}"

          run_task() {
            local task=$1
            shift
            echo ""
            echo "##### task=${task} #####"
            python scripts/data/livr_v2/build_${task}.py "$@" \
                --output-dir "${LIVR_V2_IMG_DIR}/${task}" \
                --output-jsonl-prefix "${LIVR_V2_DATA_DIR}/${task}" \
                || { echo "FAILED: ${task}"; return 1; }
          }

          run_task counting --pixmo-dir "${LIVR_V2_SRC}/pixmo_count"
          run_task jigsaw --coco-dir "${LIVR_V2_SRC}/coco"
          run_task object_localization --coco-dir "${LIVR_V2_SRC}/coco" --blink-val-dir "${LIVR_V2_SRC}/blink_val"
          run_task visual_correspondence --hpatches-dir "${LIVR_V2_SRC}/hpatches"
          run_task semantic_correspondence --spair-dir "${LIVR_V2_SRC}/spair_71k" --blink-val-dir "${LIVR_V2_SRC}/blink_val"
          run_task relative_reflectance --mid-dir "${LIVR_V2_SRC}/mid"
          run_task art_style --artbench-dir "${LIVR_V2_SRC}/artbench10" --blink-val-dir "${LIVR_V2_SRC}/blink_val"
          run_task visual_similarity --nights-dir "${LIVR_V2_SRC}/nights" --blink-val-dir "${LIVR_V2_SRC}/blink_val"

          echo ""
          echo "=== Merge ==="
          python scripts/data/livr_v2/merge.py \
              --data-dir "${LIVR_V2_DATA_DIR}" \
              --output-prefix "${LIVR_V2_DATA_DIR}/livr_v2_5task"

          echo ""
          echo "=== Done ==="
          ls -lh "${LIVR_V2_DATA_DIR}"/

        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "48Gi"
            cpu: "6"
          requests:
            nvidia.com/gpu: "1"
            memory: "32Gi"
            cpu: "4"

        volumeMounts:
          - name: cache-volume
            mountPath: /cache
          - name: outputs-volume
            mountPath: /outputs
          - name: dev-shm
            mountPath: /dev/shm

        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: PIP_CACHE_DIR
          value: "/cache/pip"
        - name: PYTHONUNBUFFERED
          value: "1"

        - name: GIT_BRANCH
          value: "feature/two-stage-critic-first"
        - name: LIVR_V2_SRC
          value: "/outputs/livr_v2_sources"
        - name: LIVR_V2_DATA_DIR
          value: "/outputs/livr_v2/data"
        - name: LIVR_V2_IMG_DIR
          value: "/outputs/livr_v2/image_base"

      tolerations:
        - key: nautilus.io/reservation
          operator: Exists
          effect: NoSchedule
        - key: nautilus.io/hardware
          operator: Equal
          value: large-gpu
        - effect: PreferNoSchedule
          key: nvidia.com/gpu
          operator: Exists
        - key: nautilus.io/issue
          operator: Exists
          effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-RTX-A6000
                - NVIDIA-A40
                - NVIDIA-L40
                - NVIDIA-L40S
                - NVIDIA-RTX-PRO-6000-Blackwell-Max-Q-Workstation-Edition

      volumes:
        - name: cache-volume
          emptyDir:
            sizeLimit: 200Gi
        - name: outputs-volume
          persistentVolumeClaim:
            claimName: ms-swift-outputs-pvc
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
